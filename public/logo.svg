      <stop offset="0%" stopColor="#4f46e5" />
      <stop offset="100%" stopColor="#d946ef" />
    </linearGradient>
    <linearGradient id="prism-grad-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="white" stopOpacity="0.8" />
