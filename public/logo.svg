  </defs>
  
  {/* The Main Heart Base - Bold and Smooth */}
  <path 
    d="M50 90 C20 65 5 45 5 25 C5 10 20 5 35 15 C42 20 47 28 50 35 C53 28 58 20 65 15 C80 5 95 10 95 25 C95 45 80 65 50 90 Z" 
